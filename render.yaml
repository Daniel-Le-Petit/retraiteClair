# Site statique Next.js : export → dossier `out/` (CDN, pas de Node au runtime).
# Spéc Render : type web + runtime static (voir docs Blueprint).
services:
  - type: web
    name: retraiteclair
    runtime: static
    buildCommand: NEXT_STATIC_EXPORT=true npm ci && npm run build
    staticPublishPath: out
