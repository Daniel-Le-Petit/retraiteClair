# Site statique Next.js : export → dossier `out/` (CDN, pas de Node au runtime).
# Spéc Render : type web + runtime static (voir docs Blueprint).
services:
  - type: web
    name: retraiteclair
    runtime: static
    # Important : `VAR= cmd && cmd` ne passe VAR qu'au 1er cmd — utiliser build:static.
    buildCommand: npm ci && npm run build:static
    staticPublishPath: out
